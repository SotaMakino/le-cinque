<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- clock face showing five o'clock — Le Cinque -->
  <circle cx="24" cy="24" r="21" fill="#F4F5F0" stroke="#2f9e4f" stroke-width="3"/>
  <!-- hour ticks at 12, 3, 6, 9 -->
  <g fill="#132110">
    <rect x="23" y="5" width="2" height="4" rx="1"/>
    <rect x="39" y="23" width="4" height="2" rx="1"/>
    <rect x="23" y="39" width="2" height="4" rx="1"/>
    <rect x="5" y="23" width="4" height="2" rx="1"/>
  </g>
  <!-- minute hand → 12 -->
  <line x1="24" y1="24" x2="24" y2="9" stroke="#132110" stroke-width="2.4" stroke-linecap="round"/>
  <!-- hour hand → 5 -->
  <line x1="24" y1="24" x2="30" y2="34" stroke="#CD212A" stroke-width="2.8" stroke-linecap="round"/>
  <!-- center pin -->
  <circle cx="24" cy="24" r="2.2" fill="#132110"/>
</svg>
